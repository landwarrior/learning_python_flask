version: "3.8"
services:
  mariadb:
    image: database:latest
    environment:
      - TZ=Asia/Tokyo
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD:-rootpassword}
      - MARIADB_DATABASE=mydb
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin
    volumes:
      - mariadb_data:/var/lib/mysql
      - /var/log/mariadb:/var/log/mysql
    ports:
      - "3306:3306"
    deploy:
      mode: replicated
      replicas: 1
    logging:
      driver: fluentd
      options:
        fluentd-address: 192.168.33.33:24224
        tag: docker.mariadb.service
  nginx:
    image: mynginx:latest
    environment:
      - TZ=Asia/Tokyo
    ports:
      - "80:80"
      - "5050:5050"
    deploy:
      mode: global
    logging:
      driver: fluentd
      options:
        fluentd-address: 192.168.33.33:24224
        tag: docker.nginx.service
  frontend:
    image: frontend:latest
    environment:
      - TZ=Asia/Tokyo
      - LANG=C.UTF-8
    deploy:
      mode: global
    ports:
      - "8080:8080"
    command: uwsgi --ini /var/app/flask/frontend/uwsgi.ini
    volumes:
      - /var/app/flask/frontend:/var/app/flask/frontend
    logging:
      driver: fluentd
      options:
        fluentd-address: 192.168.33.33:24224
        tag: docker.frontend.service
  backend:
    image: backend:latest
    environment:
      - TZ=Asia/Tokyo
      - LANG=C.UTF-8
      - SQLALCHEMY_DATABASE_URI=mysql+mysqlconnector://myaccount:myaccount@mariadb/mydb
    deploy:
      mode: global
    ports:
      - "5000:5000"
    command: uwsgi --ini /var/app/flask/backend/uwsgi.ini
    volumes:
      - /var/app/flask/backend:/var/app/flask/backend
    logging:
      driver: fluentd
      options:
        fluentd-address: 192.168.33.33:24224
        tag: docker.backend.service
  batch:
    image: batch:latest
    environment:
      - TZ=Asia/Tokyo
      - LANG=C.UTF-8
      - SQLALCHEMY_DATABASE_URI=mysql+mysqlconnector://myaccount:myaccount@mariadb/mydb
    deploy:
      mode: global
    volumes:
      - /var/app/batch:/var/app/batch
    stdin_open: true
    logging:
      driver: fluentd
      options:
        fluentd-address: 192.168.33.33:24224
        tag: docker.batch.service
  fluentd:
    image: myfluentd
    volumes:
      - /var/log/fluent:/var/log/fluent
    command:
      - fluentd
      - -c
      - /fluentd/etc/fluent.yml
    ports:
      - "24224:24224"

volumes:
  mariadb_data:
