[pytest]
# pytest は testpaths 配下を走査し、次の命名規則に合うものだけをテストとして収集する:
#   ファイル名: test_*.py または *_test.py  (例: test_users.py)
#   関数名:     test_*                      (例: test_get_users_returns_200)
#   クラス名:   Test* (メソッド名は test_*)
# conftest.py はテストではないが、同じディレクトリの fixture 定義として読み込まれる
#
# --capture=no: アプリの StreamHandler / Formatter どおりにログを表示する (-s と同等)
# --tb=short: 失敗時は assert の差分など要点だけ表示し、長いスタックトレースを抑える
addopts =
    -vv
    -p no:warnings
    --capture=no
    --tb=short
    --cov=../backend
    --cov=../common
    --cov-report=term-missing
# tests ディレクトリを :ro でマウントするため、書き込み可能な場所にキャッシュを置く
cache_dir = /tmp/.pytest_cache
# pythonpath: テスト実行中に sys.path へ追加するディレクトリ (from backend import ... など)
pythonpath =
    ../backend
# testpaths: テストファイルを探す起点ディレクトリ (. は pytest.ini があるディレクトリ自身)
testpaths =
    .
