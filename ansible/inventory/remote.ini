# 別ホストから Vagrant VM へ SSH 接続して実行する場合の inventory
# 実行例:
#   ansible-playbook -i inventory/remote.ini site.yml
#
# ansible_ssh_private_key_file はリポジトリルートからの相対パス。
# 別ホストで実行する場合は実際の鍵パスに合わせて変更すること。
[app_servers]
flask-app ansible_host=192.168.33.33 ansible_user=vagrant

[app_servers:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=../.vagrant/machines/flask-app/virtualbox/private_key
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
