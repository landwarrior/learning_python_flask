---
- name: Install bash-completion
  ansible.builtin.dnf:
    name: bash-completion
    state: present

- name: Check firewalld enabled state
  ansible.builtin.command: systemctl is-enabled firewalld
  register: firewalld_enabled
  changed_when: false
  failed_when: false

- name: Disable and stop firewalld
  ansible.builtin.systemd:
    name: firewalld
    enabled: false
    state: stopped
  when: firewalld_enabled.stdout == "enabled"

- name: Remove podman packages
  ansible.builtin.dnf:
    name: podman
    state: absent

- name: Remove runc packages
  ansible.builtin.dnf:
    name: runc
    state: absent
